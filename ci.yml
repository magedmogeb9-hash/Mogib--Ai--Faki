name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_training_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: تثبيت الاعتماديات
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: تشغيل الاختبارات
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_training_db_test
          SECRET_KEY: test_secret_key
        run: pytest -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: تثبيت الاعتماديات
        working-directory: ./frontend
        run: npm install
      - name: بناء المشروع
        working-directory: ./frontend
        run: npm run build

  docker-build:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: بناء صورة الباك إند
        run: docker build -t ai-training-backend ./backend
      - name: بناء صورة الفرونت إند
        run: docker build -t ai-training-frontend ./frontend
